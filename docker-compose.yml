services:
  backend:
    build: .
    ports:
      - "8000:8000"
    container_name: backend

  frontend:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf
    container_name: frontend
    depends_on:
      - backend