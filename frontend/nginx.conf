server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    location /predict {
        proxy_pass http://backend:8000/predict;
    }

    location /health {
        proxy_pass http://backend:8000/health;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }
}